name: SEO report RGR8820QM (push-triggered)

# Read-only SEO snapshot of the product, kicked off by changing .seo-trigger.

on:
  push:
    branches: [claude/ibanez-product-import-5bd9an]
    paths: ['.seo-trigger']

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install mysql2
      - name: SEO report
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: node seo_report_product.js --sku "RGR8820QM-BRE"
