name: Deploy Slovenské v regáli to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/slovak-brands-website-M8Qjm
    paths:
      - 'slovenske-v-regali/**'
      - '.github/workflows/deploy-slovenske-v-regali.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-slovenske-v-regali
  cancel-in-progress: true

defaults:
  run:
    working-directory: slovenske-v-regali

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ format('https://{0}.github.io', github.repository_owner) }}
      BASE_PATH: ${{ format('/{0}/', github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slovenske-v-regali/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: slovenske-v-regali/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
